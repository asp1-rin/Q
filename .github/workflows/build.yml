name: Build Q-Analyzer EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 에임 오버레이를 위해 PyQt6가 반드시 포함되어야 합니다.
        pip install frida-tools pyinstaller PyQt6

    - name: Build EXE
      run: |
        # --noconsole을 추가해서 프로그램 실행 시 검은 창이 안 뜨게 했습니다.
        if (Test-Path "icon/Q.ico") {
          pyinstaller --onefile --noconsole --icon="icon/Q.ico" --name Q Q.py
        } elseif (Test-Path "Q.ico") {
          pyinstaller --onefile --noconsole --icon="Q.ico" --name Q Q.py
        } else {
          echo "Icon not found, building without icon"
          pyinstaller --onefile --noconsole --name Q Q.py
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Q-Windows-EXE
        path: dist/Q.exe