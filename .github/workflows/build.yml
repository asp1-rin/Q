name: Build Q.exe

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4 # 최신 버전으로 업데이트

    - name: Set up Python
      uses: actions/setup-python@v5 # 최신 버전으로 업데이트
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install frida-tools requests customtkinter pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # 아이콘 경로 확인 필수
        pyinstaller --noconfirm --onefile --windowed --icon="icon/Q.ico" --name "Q" --clean Q.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4 # 에러 원인 해결 (v3 -> v4)
      with:
        name: Q-Executable
        path: dist/Q.exe

    - name: Create Release
      uses: softprops/action-gh-release@v2 # 최신 버전으로 업데이트
      with:
        files: dist/Q.exe
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
