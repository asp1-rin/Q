name: Build Q-Analyzer EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install frida-tools pyinstaller

    - name: Build EXE
      run: |
        if (Test-Path "icon/Q.ico") {
          pyinstaller --onefile --icon="icon/Q.ico" --name Q Q.py
        } elseif (Test-Path "Q.ico") {
          pyinstaller --onefile --icon="Q.ico" --name Q Q.py
        } else {
          echo "Icon not found, building without icon"
          pyinstaller --onefile --name Q Q.py
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Q-Windows-EXE
        path: dist/Q.exe
